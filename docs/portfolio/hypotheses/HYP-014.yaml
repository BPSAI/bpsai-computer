id: HYP-014
title: Headless agent sessions degrade behavioral compliance vs interactive sessions
status: actionable
confidence: 0.7
last_reviewed: '2026-03-30'
review_after: 10 more headless sprints with commit-after-task enabled, compared against
  interactive baseline
pattern: "Headless Claude Code sessions dispatched via bpsai-pair engage exhibit systematically\n\
  degraded behavioral compliance compared to interactive sessions with identical permissions.\n\
  Observed across 4 sprints / 10 tasks on 2026-03-29:\n- 0/10 tasks produced git commits\
  \ (interactive sessions always commit)\n- 1/10 tasks updated task lifecycle status\
  \ (interactive sessions do this reliably)\n- 1/4 sprints had TDD cycle completion\
  \ failure (tests written, implementation skipped)\n- 3/4 sprints had sequential\
  \ drivers clobber earlier drivers' file changes\n- CLAUDE.md enforcement instructions\
  \ present in both modes but not followed in headless\n\nThe degradation pattern\
  \ suggests headless mode lacks a feedback mechanism that interactive\nmode provides\
  \ implicitly \u2014 either human presence as accountability signal, or interactive\n\
  hook responses that headless mode skips.\n\nStrategic concern: the entire engage\
  \ pipeline depends on Claude Code headless mode. This\ncreates (a) provider lock-in\
  \ (enforcement is CC-specific hooks, not portable), and\n(b) behavioral dependency\
  \ on a mode that demonstrably underperforms. If headless reliability\ncannot be\
  \ brought to parity with interactive, the autonomous sprint model needs rearchitecting.\n"
options:
- '(a) Fix headless context: inject stronger enforcement prompts, add commit-after-task
  to engage'
- (b) Investigate CC documentation for headless best practices we may be missing
- (c) Abandon headless, use interactive sessions with programmatic input (expect-style)
- '(d) Abstract the dispatch layer: provider-agnostic agent runner that can target
  CC, Codex, or others'
- (e) Accept degradation, add HITL verification after headless sprints
